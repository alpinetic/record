name: record_windows
description: Windows specific implementation for record package called by record_platform_interface.
version: 2.2.2
homepage: https://github.com/llfbandit/record/tree/main/record_windows

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  record_platform_interface: ^2.1.0

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  plugin:
    implements: record
    platforms:
      windows:
        pluginClass: RecordWindowsPluginCApi
