name: record
description: Audio recorder from microphone to file or stream with multiple codecs, bit rate and sampling rate options.
version: 7.1.1
homepage: https://github.com/llfbandit/record/tree/main/record

topics: 
  - audio
  - recorder
  - audio-recorder

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  record_android: ^2.1.2
  record_ios: ^2.1.1
  record_linux: ^2.1.0
  record_macos: ^2.1.1
  record_platform_interface: ^2.1.0
  record_web: ^2.1.1
  record_windows: ^2.2.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

# The following section is specific to Flutter.
flutter:
  plugin:
    platforms:
      android:
        default_package: record_android
      ios:
        default_package: record_ios
      web:
        default_package: record_web
      windows:
        default_package: record_windows
      macos:
        default_package: record_macos
      linux:
        default_package: record_linux
